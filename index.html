<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星核觉醒 · STELLAR CORE</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:monospace; }
    #video {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh;
      object-fit:cover; z-index:0;
    }
    #threeCanvas {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh;
      z-index:1; pointer-events:none;
    }
    #ui {
      position:fixed; top:0; left:0;
      width:100vw; height:100vh;
      z-index:2; pointer-events:none;
    }
    #startBtn {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,0.88); z-index:10; cursor:pointer;
    }
    #startBtn h1 { color:#FFD700; font-size:28px; letter-spacing:4px; margin-bottom:10px; text-shadow:0 0 20px #FFD700; }
    #startBtn p { color:#00ff88; font-size:14px; margin-bottom:44px; letter-spacing:2px; }
    #startBtn button {
      background:transparent; border:2px solid #00ff88;
      color:#00ff88; font-family:monospace; font-size:16px;
      padding:14px 40px; cursor:pointer; letter-spacing:2px;
      border-radius:4px; box-shadow:0 0 12px rgba(0,255,136,0.3);
    }
    .corner { position:absolute; width:24px; height:24px; border:3px solid #fff; }
    .tl{top:0;left:0;border-right:none;border-bottom:none;}
    .tr{top:0;right:0;border-left:none;border-bottom:none;}
    .bl{bottom:0;left:0;border-right:none;border-top:none;}
    .br{bottom:0;right:0;border-left:none;border-top:none;}
    .sline {
      position:absolute; left:4px; right:4px; height:2px;
      background:#00ff88; box-shadow:0 0 8px #00ff88;
      animation:scanAnim 2s ease-in-out infinite;
    }
    .sline2 { animation-delay:1s; }
    @keyframes scanAnim { 0%,100%{top:4px} 50%{top:calc(100% - 6px)} }
    #scanner {
      position:absolute; top:50%; left:50%;
      width:220px; height:220px;
      transform:translate(-50%,-58%); display:none;
    }
    #hudL {
      position:absolute; top:20px; left:16px;
      color:#00ff88; font-size:12px; line-height:1.8;
      text-shadow:0 0 4px #00ff88; display:none;
    }
    #hudR { position:absolute; top:20px; right:16px; text-align:right; display:none; }
    #energyLabel { color:#00ff88; font-size:12px; margin-bottom:4px; }
    #energyBg { width:90px; height:7px; background:rgba(255,255,255,0.15); border-radius:4px; overflow:hidden; border:1px solid rgba(0,255,136,0.3); }
    #energyFill { width:0%; height:100%; background:linear-gradient(90deg,#ff3300,#FFD700); transition:width 0.6s ease; border-radius:4px; }
    #hint {
      position:absolute; bottom:50px; left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.65);
      border:1px solid rgba(255,255,255,0.15);
      color:#fff; font-size:14px;
      padding:9px 20px; border-radius:6px;
      white-space:nowrap; display:none; letter-spacing:1px;
    }
    #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:20; transition:opacity 0.15s; }
    #awakened {
      position:fixed; top:38%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; z-index:25; display:none; pointer-events:none;
    }
    #awakened h1 { color:#FFD700; font-size:22px; letter-spacing:3px; text-shadow:0 0 20px #FFD700, 0 0 40px #FFD700; }
    #awakened p { color:#00ff88; font-size:13px; margin-top:10px; opacity:0; transition:opacity 0.8s; letter-spacing:2px; }
    #progressCanvas { position:fixed; inset:0; pointer-events:none; z-index:15; }
    #touchLayer { position:fixed; inset:0; z-index:5; display:none; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="threeCanvas"></canvas>

<div id="ui">
  <div id="scanner">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="sline"></div><div class="sline sline2"></div>
  </div>
  <div id="hudL">SYS: ONLINE<br>CORE: DETECTED</div>
  <div id="hudR">
    <div id="energyLabel">ENERGY</div>
    <div id="energyBg"><div id="energyFill"></div></div>
  </div>
  <div id="hint"></div>
</div>

<div id="startBtn">
  <h1>STELLAR CORE</h1>
  <p>星 核 觉 醒</p>
  <button id="startBtnInner">▶ 启动 AR 体验</button>
</div>

<div id="flash"></div>
<div id="awakened">
  <h1 id="awakenTitle"></h1>
  <p id="awakenSub">异常能量体已完全激活</p>
</div>
<canvas id="progressCanvas"></canvas>
<div id="touchLayer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const $ = id => document.getElementById(id);

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }, audio:false
    });
    $('video').srcObject = stream;
    return true;
  } catch(e) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
      $('video').srcObject = stream;
      return true;
    } catch(e2) {
      alert('无法访问摄像头，请在浏览器设置中允许摄像头权限后刷新页面');
      return false;
    }
  }
}

// Three.js
const canvas = $('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);
cam.position.set(0, 0, 1.2);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
});

scene.add(new THREE.AmbientLight(0x333333));
const ptL = new THREE.PointLight(0xff6600, 2);
ptL.position.set(1,1,1); scene.add(ptL);

const planet = new THREE.Group();
planet.position.set(0, 0.05, 0);
scene.add(planet);

const coreMat = new THREE.MeshStandardMaterial({ color:0x1a0a2e, roughness:0.8, metalness:0.3 });
const core = new THREE.Mesh(new THREE.SphereGeometry(0.18,32,32), coreMat);
planet.add(core);

const crackMat = new THREE.MeshBasicMaterial({ color:0xff3300, wireframe:true, transparent:true, opacity:0.45 });
planet.add(new THREE.Mesh(new THREE.SphereGeometry(0.184,32,32), crackMat));

const glowMat = new THREE.MeshBasicMaterial({ color:0x4400ff, transparent:true, opacity:0.1, side:THREE.BackSide });
const glow = new THREE.Mesh(new THREE.SphereGeometry(0.22,32,32), glowMat);
planet.add(glow);

const mkPts=(n,r0,r1,sz,col)=>{
  const geo=new THREE.BufferGeometry(), pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=r0+Math.random()*(r1-r0), phi=Math.acos(2*Math.random()-1), th=Math.random()*6.28;
    pos[i*3]=r*Math.sin(phi)*Math.cos(th); pos[i*3+1]=r*Math.sin(phi)*Math.sin(th); pos[i*3+2]=r*Math.cos(phi);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  return new THREE.Points(geo,new THREE.PointsMaterial({size:sz,color:col,transparent:true,opacity:0.8}));
};
const orbit=mkPts(200,0.26,0.42,0.004,0x88aaff); planet.add(orbit);

const BN=500, bGeo=new THREE.BufferGeometry(), bPos=new Float32Array(BN*3), bVel=new Float32Array(BN*3);
bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
const bMat=new THREE.PointsMaterial({size:0.006,color:0xFFD700,transparent:true,opacity:0});
const burstPts=new THREE.Points(bGeo,bMat); scene.add(burstPts);
let burstActive=false, burstStart=0;

const triggerBurst=(n=500)=>{
  burstActive=true; burstStart=Date.now(); bMat.opacity=1;
  const a=bGeo.attributes.position;
  for(let i=0;i<n;i++){
    const sp=0.015+Math.random()*0.025, phi=Math.acos(2*Math.random()-1), th=Math.random()*6.28;
    bVel[i*3]=sp*Math.sin(phi)*Math.cos(th); bVel[i*3+1]=sp*Math.sin(phi)*Math.sin(th); bVel[i*3+2]=sp*Math.cos(phi);
    a.array[i*3]=0; a.array[i*3+1]=0.05; a.array[i*3+2]=0;
  }
  a.needsUpdate=true;
};

const jGeo=new THREE.BufferGeometry(), jPos=new Float32Array(300*3), jVel=new Float32Array(300*3);
jGeo.setAttribute('position',new THREE.BufferAttribute(jPos,3));
let jPtr=0, isJetting=false;
const jet=new THREE.Points(jGeo,new THREE.PointsMaterial({size:0.003,color:0xFFD700,transparent:true,opacity:0.7}));
scene.add(jet);

const pCanvas=$('progressCanvas'), pCtx=pCanvas.getContext('2d');
const rszP=()=>{ pCanvas.width=innerWidth; pCanvas.height=innerHeight; };
window.addEventListener('resize',rszP); rszP();

let stage=0, clickCount=0, rotateTotal=0, isDragging=false, lastX=0, rotSpeed=0.008;
let lpTimer=null, lpProgress=0, rune=null, audioCtx=null;

const setEnergy=()=>{ const m={0:'0%',2:'33%',3:'66%',4:'100%'}; $('energyFill').style.width=m[stage]||'0%'; };
const setHint=t=>{ $('hint').textContent=t; };

const playSound=()=>{
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(200,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(900,audioCtx.currentTime+1.2);
  g.gain.setValueAtTime(0.25,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.8);
  o.start(); o.stop(audioCtx.currentTime+1.8);
};

const awaken=()=>{
  stage=4; setEnergy(); $('hint').style.display='none';
  playSound(); triggerBurst(500);
  setTimeout(()=>{ let sc=1; const gr=()=>{ sc+=0.05; crackMat.opacity-=0.04; if(sc<1.5) requestAnimationFrame(gr); else { const cm=planet.children.find(c=>c.material===crackMat); if(cm) cm.visible=false; } }; gr(); glowMat.opacity=0.6; },300);
  setTimeout(()=>{ rotSpeed=0.06; const tgt=new THREE.Color(0xFFD700); const lp=()=>{ coreMat.color.lerp(tgt,0.06); if(coreMat.color.r<0.99) requestAnimationFrame(lp); }; lp(); },600);
  setTimeout(()=>{ $('flash').style.opacity='1'; setTimeout(()=>$('flash').style.opacity='0',200); },1000);
  setTimeout(()=>{ glowMat.color.set(0xFFD700); glowMat.opacity=0.28; isJetting=true; },1500);
  setTimeout(()=>{
    $('awakened').style.display='block';
    const txt="STELLAR CORE AWAKENED"; let i=0;
    const tp=()=>{ $('awakenTitle').textContent+=txt[i]; i++; if(i<txt.length) setTimeout(tp,80); else $('awakenSub').style.opacity='1'; };
    tp();
  },2500);
};

const ray=new THREE.Raycaster(), ndcV=new THREE.Vector2();
const onDown=e=>{
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  ndcV.x=(cx/innerWidth)*2-1; ndcV.y=-(cy/innerHeight)*2+1;
  isDragging=true; lastX=cx;
  if(stage<2){
    ray.setFromCamera(ndcV,cam);
    if(ray.intersectObject(core).length>0){
      clickCount++; crackMat.opacity=Math.min(1,crackMat.opacity+0.18); triggerBurst(60);
      if(clickCount>=3){ stage=2; crackMat.color.set(0xff8800); setEnergy(); setHint('旋转星球，寻找符文'); }
    }
  } else if(stage===3){
    lpProgress=0;
    lpTimer=setInterval(()=>{ lpProgress+=4; if(lpProgress>=100){ clearInterval(lpTimer); lpTimer=null; awaken(); } },80);
  }
};
const onUp=()=>{ isDragging=false; if(lpTimer){ clearInterval(lpTimer); lpTimer=null; lpProgress=0; } };
const onMove=e=>{
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  if(isDragging&&stage===2){
    const d=(cx-lastX)*0.014; rotateTotal+=Math.abs(d*50); planet.rotation.y+=d;
    if(rotateTotal>=180&&!rune){
      rune=new THREE.Mesh(new THREE.PlaneGeometry(0.08,0.08),new THREE.MeshBasicMaterial({color:0x00ffff,side:THREE.DoubleSide}));
      rune.position.set(0,0,-0.19); planet.add(rune);
      stage=3; setEnergy(); setHint('长按符文激活核心');
    }
  }
  lastX=cx;
};

const tl=$('touchLayer');
tl.addEventListener('mousedown',onDown); tl.addEventListener('touchstart',onDown,{passive:true});
tl.addEventListener('mouseup',onUp); tl.addEventListener('touchend',onUp);
tl.addEventListener('mousemove',onMove); tl.addEventListener('touchmove',onMove,{passive:true});

renderer.setAnimationLoop(()=>{
  planet.rotation.y+=rotSpeed; orbit.rotation.y+=0.004;
  if(burstActive){
    const el=Date.now()-burstStart, a=bGeo.attributes.position;
    if(el<1500){ bMat.opacity=1-(el/1500); for(let i=0;i<BN;i++){ a.array[i*3]+=bVel[i*3]; a.array[i*3+1]+=bVel[i*3+1]; a.array[i*3+2]+=bVel[i*3+2]; } a.needsUpdate=true; }
    else { burstActive=false; bMat.opacity=0; }
  }
  if(isJetting){
    const ja=jGeo.attributes.position;
    for(let i=0;i<3;i++){
      const idx=jPtr*3, sp=0.008+Math.random()*0.015, phi=Math.acos(2*Math.random()-1), th=Math.random()*6.28;
      ja.array[idx]=(Math.random()-0.5)*0.06; ja.array[idx+1]=0.05+(Math.random()-0.5)*0.06; ja.array[idx+2]=(Math.random()-0.5)*0.06;
      jVel[idx]=sp*Math.sin(phi)*Math.cos(th); jVel[idx+1]=sp*Math.sin(phi)*Math.sin(th); jVel[idx+2]=sp*Math.cos(phi);
      jPtr=(jPtr+1)%300;
    }
    for(let i=0;i<300;i++){ ja.array[i*3]+=jVel[i*3]; ja.array[i*3+1]+=jVel[i*3+1]; ja.array[i*3+2]+=jVel[i*3+2]; }
    ja.needsUpdate=true;
  }
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  if(lpProgress>0){
    const cx=pCanvas.width/2, cy=pCanvas.height/2;
    pCtx.beginPath(); pCtx.arc(cx,cy,58,0,Math.PI*2); pCtx.strokeStyle='rgba(255,255,255,0.15)'; pCtx.lineWidth=10; pCtx.stroke();
    pCtx.beginPath(); pCtx.arc(cx,cy,58,-Math.PI/2,-Math.PI/2+Math.PI*2*lpProgress/100); pCtx.strokeStyle='#00ffff'; pCtx.lineWidth=10; pCtx.stroke();
  }
  renderer.render(scene,cam);
});

$('startBtnInner').addEventListener('click', async()=>{
  const ok=await startCamera();
  if(!ok) return;
  $('startBtn').style.display='none';
  $('scanner').style.display='block';
  $('hudL').style.display='block';
  $('hudR').style.display='block';
  $('hint').style.display='block';
  $('touchLayer').style.display='block';
  setHint('点击星球唤醒能量');
  setEnergy();
});
</script>
</body>
</html>
