<!-- 
《星核觉醒》STELLAR CORE
使用说明：
1. 用手机浏览器打开本页面（需允许摄像头权限）
2. 将摄像头对准官方示例卡片图案
   下载地址：https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/examples/assets/card-example/
3. 或使用 target.html 中的自定义图案（需重新编译.mind文件）
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StellarCore - Ultimate AR Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:black; font-family:monospace; color:#fff; }
        #scanner { position:fixed; top:50%; left:50%; width:200px; height:200px; transform:translate(-50%, -50%); z-index:10; pointer-events:none; }
        .corner { position:absolute; width:20px; height:20px; border:2px solid #fff; }
        .tl { top:0; left:0; border-right:none; border-bottom:none; }
        .tr { top:0; right:0; border-left:none; border-bottom:none; }
        .bl { bottom:0; left:0; border-right:none; border-top:none; }
        .br { bottom:0; right:0; border-left:none; border-top:none; }
        .scan-line { position:absolute; left:0; width:100%; height:2px; background:#00ff88; box-shadow:0 0 8px #00ff88; animation:scan 3s ease-in-out infinite; }
        .scan-line-2 { animation-delay:1.5s; }
        @keyframes scan { 0%, 100% { top:0; } 50% { top:100%; } }
        #scan-text { position:absolute; bottom:-40px; width:100%; text-align:center; color:#00ff88; font-size:12px; }
        #hud-left { position:fixed; top:20px; left:20px; font-size:12px; color:#00ff88; z-index:20; line-height:1.5; }
        #hud-right { position:fixed; top:20px; right:20px; text-align:right; z-index:20; }
        .energy-label { font-size:12px; margin-bottom:4px; }
        .energy-bar-bg { width:80px; height:6px; background:rgba(255,255,255,0.2); border-radius:3px; overflow:hidden; }
        #energy-fill { width:0%; height:100%; background:linear-gradient(90deg, #ff3300, #FFD700); transition:width 0.5s ease; }
        #hint-box { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.6); padding:8px 16px; border-radius:4px; font-size:14px; z-index:20; white-space:nowrap; border:1px solid rgba(255,255,255,0.1); }
        #flash { position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:300; opacity:0; pointer-events:none; }
        #terminal { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; z-index:400; pointer-events:none; display:none; }
        #terminal h1 { color:#FFD700; font-size:24px; letter-spacing:4px; margin:0; }
        #terminal p { color:#00ff88; font-size:14px; margin-top:10px; opacity:0; }
        canvas#progress-overlay { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div id="scanner">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line"></div><div class="scan-line scan-line-2"></div>
        <div id="scan-text">将摄像头对准目标图案</div>
    </div>
    <div id="hud-left" class="hidden">SYS: ONLINE<br>TARGET: LOCKED</div>
    <div id="hud-right" class="hidden">
        <div class="energy-label">ENERGY</div>
        <div class="energy-bar-bg"><div id="energy-fill"></div></div>
    </div>
    <div id="hint-box" class="hidden">点击星球唤醒能量</div>
    <div id="flash"></div>
    <div id="terminal">
        <h1 id="awaken-title"></h1>
        <p id="awaken-sub">异常能量体已完全激活</p>
    </div>
    <canvas id="progress-overlay"></canvas>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let stage = 0, clickCount = 0, rotateTotal = 0, longPressTimer = null, longPressProgress = 0;
            let isDragging = false, lastX = 0, rotationSpeed = 0.005, isJetting = false;
            let audioCtx = null;

            const initAudio = () => { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };

            const start = async () => {
                const mindarThree = new window.MINDAR.IMAGE.MindARThree({
                    container: document.body,
                    imageTargetSrc: 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/examples/assets/card-example/card.mind',
                });
                const { renderer, scene, camera } = mindarThree;

                // 最终校验优化：alpha与pixelRatio
                renderer.setPixelRatio(window.devicePixelRatio);
                // 默认MindARThree已经设置了alpha:true，但显式调用确保稳健
                renderer.setClearAlpha(0);

                const ui = {
                    scanner: document.getElementById('scanner'),
                    hudL: document.getElementById('hud-left'),
                    hudR: document.getElementById('hud-right'),
                    energy: document.getElementById('energy-fill'),
                    hint: document.getElementById('hint-box'),
                    flash: document.getElementById('flash'),
                    term: document.getElementById('terminal'),
                    title: document.getElementById('awaken-title'),
                    sub: document.getElementById('awaken-sub'),
                    overlay: document.getElementById('progress-overlay')
                };
                const ctx = ui.overlay.getContext('2d');
                const resize = () => { ui.overlay.width = window.innerWidth; ui.overlay.height = window.innerHeight; };
                window.addEventListener('resize', resize); resize();

                const anchor = mindarThree.addAnchor(0);
                const root = new THREE.Group(); anchor.group.add(root);
                const planet = new THREE.Group(); root.add(planet);

                const core = new THREE.Mesh(new THREE.SphereGeometry(0.15, 32, 32), new THREE.MeshStandardMaterial({ color: 0x1a0a2e, roughness: 0.8, metalness: 0.3 }));
                const cracks = new THREE.Mesh(new THREE.SphereGeometry(0.152, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff3300, wireframe: true, transparent: true, opacity: 0.4 }));
                const glow = new THREE.Mesh(new THREE.SphereGeometry(0.18, 32, 32), new THREE.MeshBasicMaterial({ color: 0x4400ff, transparent: true, opacity: 0.08, side: 1 }));
                planet.add(core); planet.add(cracks); root.add(glow);

                // 粒子系统全逻辑同前...
                const createPoints = (count, rMin, rMax, size, col) => {
                    const geo = new THREE.BufferGeometry(), pos = new Float32Array(count * 3);
                    for(let i=0; i<count; i++) {
                        const r = rMin + Math.random()*(rMax-rMin), p = Math.acos(2*Math.random()-1), t = Math.random()*6.28;
                        pos[i*3]=r*Math.sin(p)*Math.cos(t); pos[i*3+1]=r*Math.sin(p)*Math.sin(t); pos[i*3+2]=r*Math.cos(p);
                    }
                    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                    return new THREE.Points(geo, new THREE.PointsMaterial({ size, color: col, transparent: true, opacity: 0.8 }));
                };
                const orbit = createPoints(200, 0.2, 0.35, 0.003, 0x88aaff); root.add(orbit);
                
                const burstCount = 500;
                const burstGeo = new THREE.BufferGeometry();
                const burstPosAttr = new THREE.BufferAttribute(new Float32Array(burstCount * 3), 3);
                burstGeo.setAttribute('position', burstPosAttr);
                const burstVel = new Float32Array(burstCount * 3);
                const burstMat = new THREE.PointsMaterial({ size: 0.005, color: 0xFFD700, transparent: true, opacity: 0 });
                const burst = new THREE.Points(burstGeo, burstMat); root.add(burst);

                const jetGeo = new THREE.BufferGeometry();
                const jetPosAttr = new THREE.BufferAttribute(new Float32Array(300 * 3), 3);
                jetGeo.setAttribute('position', jetPosAttr);
                const jetVel = new Float32Array(300 * 3); let jetPtr = 0;
                const jet = new THREE.Points(jetGeo, new THREE.PointsMaterial({ size: 0.002, color: 0xFFD700, transparent: true })); root.add(jet);

                let burstActive = false, burstT = 0, burstS = 500;
                window.triggerBurst = (s=500) => {
                    burstS=s; burstActive=true; burstT=Date.now(); burstMat.opacity=1;
                    for(let i=0; i<s; i++) {
                        const sp=0.02+Math.random()*0.03, t=Math.random()*6.28, p=Math.acos(2*Math.random()-1);
                        burstVel[i*3]=sp*Math.sin(p)*Math.cos(t); burstVel[i*3+1]=sp*Math.sin(p)*Math.sin(t); burstVel[i*3+2]=sp*Math.cos(p);
                        burstPosAttr.array[i*3]=0; burstPosAttr.array[i*3+1]=0; burstPosAttr.array[i*3+2]=0;
                    }
                    burstPosAttr.needsUpdate=true;
                };

                const updateUI = () => {
                    const m = { 0:'0%', 2:'33%', 3:'66%', 4:'100%' };
                    ui.energy.style.width = m[stage] || '0%';
                    if(stage===0) ui.hint.innerText="点击星球唤醒能量";
                    else if(stage===2) ui.hint.innerText="旋转星球寻找符文";
                    else if(stage===3) ui.hint.innerText="长按符文激活核心";
                };

                const awaken = () => {
                    initAudio(); stage=4; updateUI(); window.triggerBurst(500); ui.hint.classList.add('hidden');
                    const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setTargetAtTime(800, audioCtx.currentTime, 0.5); g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.8);
                    o.start(); o.stop(audioCtx.currentTime+1);
                    
                    setTimeout(() => { 
                        let sc=1.0; 
                        const g=()=> { sc+=0.05; cracks.scale.set(sc,sc,sc); cracks.material.opacity-=0.05; if(sc<1.5) requestAnimationFrame(g); else cracks.visible=false; }; 
                        g(); glow.material.opacity=0.6;
                    }, 300);
                    setTimeout(() => { rotationSpeed=0.05; const ct=new THREE.Color(0xFFD700); const f=()=>{ core.material.color.lerp(ct,0.05); if(core.material.color.getHex()!==0xFFD700) requestAnimationFrame(f); }; f(); }, 600);
                    setTimeout(() => { ui.flash.style.opacity=1; setTimeout(()=>ui.flash.style.opacity=0, 150); }, 1000);
                    setTimeout(() => { glow.material.color.set(0xFFD700); glow.material.opacity=0.25; isJetting=true; }, 1500);
                    setTimeout(() => { ui.term.style.display='block'; let i=0, s="STELLAR CORE AWAKENED"; const t=()=>{ ui.title.innerText+=s[i]; i++; if(i<s.length) setTimeout(t,80); else ui.sub.style.opacity=1; }; t(); }, 2500);
                };

                const ray = new THREE.Raycaster(), mv = new THREE.Vector2(); let rune = null;
                const inputDown = (e) => {
                    initAudio(); const cx = e.touches?e.touches[0].clientX:e.clientX, cy = e.touches?e.touches[0].clientY:e.clientY;
                    mv.x=(cx/window.innerWidth)*2-1; mv.y=-(cy/window.innerHeight)*2+1;
                    if(stage<2) { ray.setFromCamera(mv, camera); if(ray.intersectObject(core).length>0){ clickCount++; cracks.material.opacity+=0.15; window.triggerBurst(50); if(clickCount>=3){ stage=2; cracks.material.color.set(0xff8800); updateUI(); } } }
                    else if(stage===3) { longPressProgress=0; longPressTimer=setInterval(()=>{ longPressProgress+=4; if(longPressProgress>=100){ clearInterval(longPressTimer); awaken(); } }, 80); }
                    isDragging=true; lastX=cx;
                };
                const inputUp = () => { isDragging=false; if(longPressTimer){ clearInterval(longPressTimer); longPressTimer=null; longPressProgress=0; } };
                const inputMove = (e) => { 
                    const cx = e.touches?e.touches[0].clientX:e.clientX;
                    if(isDragging && stage===2){ 
                        const d=(cx-lastX)*0.01; rotateTotal+=Math.abs(d*50); planet.rotation.y+=d; 
                        if(rotateTotal>=180 && !rune){ rune=new THREE.Mesh(new THREE.PlaneGeometry(0.06,0.06), new THREE.MeshBasicMaterial({color:0x00ffff,side:2})); rune.position.set(0,0,-0.16); planet.add(rune); stage=3; updateUI(); }
                    }
                    lastX=cx;
                };

                window.addEventListener('mousedown', inputDown); window.addEventListener('touchstart', inputDown);
                window.addEventListener('mouseup', inputUp); window.addEventListener('touchend', inputUp);
                window.addEventListener('mousemove', inputMove); window.addEventListener('touchmove', inputMove);

                anchor.onTargetFound = () => { ui.scanner.classList.add('hidden'); ui.hudL.classList.remove('hidden'); ui.hudR.classList.remove('hidden'); ui.hint.classList.remove('hidden'); if(stage===0) updateUI(); };
                anchor.onTargetLost = () => { ui.scanner.classList.remove('hidden'); ui.hudL.classList.add('hidden'); ui.hudR.classList.add('hidden'); ui.hint.classList.add('hidden'); };

                await mindarThree.start();
                renderer.setAnimationLoop(() => {
                    planet.rotation.y += rotationSpeed; orbit.rotation.y += 0.003;
                    if(burstActive) {
                        const el = Date.now()-burstT;
                        if(el<1500) { burstMat.opacity=1-(el/1500); for(let i=0;i<burstS;i++){ burstPosAttr.array[i*3]+=burstVel[i*3]; burstPosAttr.array[i*3+1]+=burstVel[i*3+1]; burstPosAttr.array[i*3+2]+=burstVel[i*3+2]; } burstPosAttr.needsUpdate=true; }
                        else burstActive=false;
                    }
                    if(isJetting) {
                        for(let i=0;i<3;i++) { const idx=jetPtr*3; jetPosAttr.array[idx]=(Math.random()-0.5)*0.1; jetPosAttr.array[idx+1]=(Math.random()-0.5)*0.1; jetPosAttr.array[idx+2]=(Math.random()-0.5)*0.1; const s=0.01+Math.random()*0.02, t=Math.random()*6.28, p=Math.acos(2*Math.random()-1); jetVel[idx]=s*Math.sin(p)*Math.cos(t); jetVel[idx+1]=s*Math.sin(p)*Math.sin(t); jetVel[idx+2]=s*Math.cos(p); jetPtr=(jetPtr+1)%300;}
                        for(let i=0;i<300;i++){ jetPosAttr.array[i*3]+=jetVel[i*3]; jetPosAttr.array[i*3+1]+=jetVel[i*3+1]; jetPosAttr.array[i*3+2]+=jetVel[i*3+2]; } jetPosAttr.needsUpdate=true;
                    }
                    ctx.clearRect(0,0,ui.overlay.width,ui.overlay.height);
                    if(longPressProgress>0) {
                        const x=ui.overlay.width/2, y=ui.overlay.height/2; ctx.beginPath(); ctx.arc(x,y,60,0,6.28); ctx.strokeStyle="rgba(255,255,255,0.2)"; ctx.lineWidth=10; ctx.stroke();
                        ctx.beginPath(); ctx.arc(x,y,60,-1.57,-1.57+6.28*longPressProgress/100); ctx.strokeStyle="#00ffff"; ctx.lineWidth=10; ctx.stroke();
                    }
                    renderer.render(scene, camera);
                });
            };
            start();
        });
    </script>
</body>
</html>
